services:
  db:
    image: postgres:latest
    restart: unless-stopped
    ports:
      - '5432:5432'
    volumes:
      - type: tmpfs
        target: /dev/shm
        tmpfs:
          size: 134217728
      - pg_data:/var/lib/postgresql
    environment:
      - POSTGRES_DB=acme
      - POSTGRES_USER=acme
      - POSTGRES_PASSWORD=acme
  cache:
    image: redis:latest
    restart: unless-stopped
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data

volumes:
  pg_data:
  redis_data: